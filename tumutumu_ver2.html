<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ポチッと消し</title>
<style>
  :root {
    --text: #2C2C2B;
    --sub: #7D7A75;
    --canvas: #FFFFFF;
    --soft: #F9F8F7;
    --surface: #F0EFED;
    --border: #E6E5E3;
    --blue: #2783DE;
    --blue-soft: #E5F2FC;
    --green: #46A171;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", Roboto, sans-serif;
    color: var(--text);
    background: var(--soft);
  }
  body {
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .app {
    width: 100%;
    max-width: 360px;
    background: radial-gradient(120% 100% at 50% 0%, #1a2350 0%, #0e1430 55%, #05070f 100%);
    border: 1px solid #2a335e;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,.25), 0 8px 24px rgba(0,0,0,.35);
    position: relative;
    overflow: hidden;
    color: #EAF0FF;
  }
  .hud {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 12px;
  }
  .stat { display: flex; flex-direction: column; }
  .stat .label { font-size: 12px; color: #9FB2E0; letter-spacing: .02em; }
  .stat .value { font-size: 22px; font-weight: 700; line-height: 1.1; color: #F4F7FF; }
  .app.prestart .hud, .app.prestart .timerbar { visibility: hidden; }
  .timerbar {
    height: 8px; background: rgba(255,255,255,.14); border-radius: 8px;
    overflow: hidden; margin-bottom: 12px;
  }
  .timerbar > i {
    display: block; height: 100%; width: 100%;
    background: var(--blue); border-radius: 8px;
    transition: width .1s linear;
  }
  .boardwrap { position: relative; }
  canvas { display: block; width: 100%; height: auto; border-radius: 8px; touch-action: none; }
  .hint { text-align: center; font-size: 13px; color: #9FB2E0; margin-top: 10px; min-height: 18px; }

  .overlay {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 50% 40%, rgba(242,194,78,.22) 0%, rgba(242,194,78,0) 46%),
      radial-gradient(120% 100% at 50% 0%, rgba(26,35,80,.97) 0%, rgba(8,11,30,.98) 70%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; gap: 8px;
    opacity: 0; pointer-events: none; transition: opacity .2s ease;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .overlay h1 {
    font-size: 42px; margin: 0; font-weight: 900; letter-spacing: .01em; line-height: 1.02;
    background: linear-gradient(180deg,#FFF7D6 0%,#FFD86B 45%,#F0A62E 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,.55));
    transform: rotate(-2.5deg);
  }
  .overlay .ov-deco { color: #F2C24E; font-size: 12px; letter-spacing: .5em; margin: 6px 0 6px; opacity: .9; padding-left: .5em; }
  .overlay p { margin: 0; color: #DCE5FF; font-size: 14px; line-height: 1.75; font-weight: 600; }
  .reward {
    margin: 8px 0; padding: 12px 20px;
    background: var(--blue-soft); color: var(--blue);
    border-radius: 12px; font-size: 20px; font-weight: 700;
  }
  button {
    margin-top: 8px; padding: 12px 28px;
    font-size: 16px; font-weight: 600; font-family: inherit;
    color: #fff; background: var(--blue);
    border: none; border-radius: 8px; cursor: pointer;
    min-height: 44px;
  }
  button:active { transform: translateY(1px); }
  #startBtn {
    margin-top: 16px; padding: 14px 48px;
    font-size: 19px; font-weight: 900; letter-spacing: .12em;
    color: #4a3208;
    background: linear-gradient(180deg,#FFEFB0 0%,#F2C24E 55%,#E19B2A 100%);
    border: none; border-radius: 999px; cursor: pointer; min-height: 48px;
    box-shadow: 0 4px 0 #b9781f, 0 10px 22px rgba(242,194,78,.45);
    animation: startPulse 1.5s ease-in-out infinite;
  }
  #startBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b9781f, 0 4px 12px rgba(242,194,78,.4); animation: none; }
  @keyframes startPulse {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-2px) scale(1.045); }
  }

  /* ===== branded result screen ===== */
  .result {
    position: absolute; inset: 0;
    background: radial-gradient(120% 90% at 50% 0%, #1b3a7a 0%, #0a1836 62%, #060f26 100%);
    border: 6px solid #EAC26B; border-radius: 12px;
    display: none; flex-direction: column; align-items: center;
    text-align: center; padding: 12px 16px 14px; gap: 1px;
    overflow-y: auto; color: #fff; -webkit-overflow-scrolling: touch;
  }
  .result.show { display: flex; }
  .r-brand { font-size: 12px; letter-spacing: .35em; font-weight: 700; color: #cfe0ff; padding-left: .35em; }
  .r-title {
    font-size: 24px; font-weight: 800; letter-spacing: .02em; line-height: 1.05;
    background: linear-gradient(180deg,#FBE9A8,#E8B84B 60%,#C9922E);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,.4)); margin-bottom: 2px;
  }
  .r-score-label, .r-point-label { font-size: 12px; color: rgba(255,255,255,.7); letter-spacing: .08em; }
  .r-score-val { font-size: 20px; font-weight: 800; line-height: 1; margin-bottom: 1px; }
  .r-point-val {
    font-size: 52px; font-weight: 900; line-height: .92;
    background: linear-gradient(180deg,#FFF4CE,#F2C24E 55%,#D69A2C);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 3px 3px rgba(0,0,0,.45));
  }
  .r-point-val small { font-size: 18px; font-weight: 800; -webkit-text-fill-color: #F2C24E; }
  .r-stars { font-size: 22px; letter-spacing: 5px; margin-top: 3px; }
  .r-stars b { color: #F2C24E; }
  .r-stars .off { color: rgba(255,255,255,.22); }
  .r-rank { font-size: 16px; font-weight: 800; margin: 2px 0 6px; }
  .r-prod {
    display: flex; align-items: center; gap: 12px; text-align: left;
    background: #fff; border: 2px solid #EAC26B; border-radius: 12px;
    padding: 8px 10px; width: 100%; max-width: 300px; color: var(--text);
  }
  .r-prod-img { width: 42px; height: auto; flex: 0 0 auto; }
  .r-prod-name { font-size: 15px; font-weight: 800; color: #12275c; }
  .r-tags { display: flex; flex-direction: column; gap: 3px; margin: 4px 0; }
  .r-tags span { font-size: 10px; font-weight: 700; color: #fff; background: #2783DE; border-radius: 5px; padding: 2px 6px; align-self: flex-start; }
  .r-prod-tag { font-size: 12px; font-weight: 800; color: #E56458; }
  .r-tagline { font-size: 12px; color: rgba(255,255,255,.85); margin: 6px 0 1px; font-weight: 600; }
  .r-btn {
    display: block; width: 100%; max-width: 300px; text-decoration: none; text-align: center;
    padding: 12px 16px; border-radius: 999px; font-size: 15px; font-weight: 800;
    border: none; cursor: pointer; min-height: 42px; font-family: inherit; margin-top: 6px;
    box-shadow: 0 3px 0 rgba(0,0,0,.18);
  }
  .r-btn-red { background: #E23B4E; color: #fff; }
  .r-btn-yellow { background: linear-gradient(180deg,#F2C24E,#D69A2C); color: #4a3208; }
  .r-btn-gray { background: #6b7385; color: #fff; box-shadow: none; margin-top: 7px; }
  .r-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,.18); }
</style>
</head>
<body>
  <div class="app prestart" id="app">
    <div class="hud">
      <div class="stat"><span class="label">SCORE</span><span class="value" id="score">0</span></div>

    const w = wrap.clientWidth;
    cell = Math.floor(w / COLS);
    const cw = cell * COLS, ch = cell * ROWS;
    dpr = window.devicePixelRatio || 1;
    canvas.width = cw * dpr; canvas.height = ch * dpr;
    canvas.style.width = cw + 'px'; canvas.style.height = ch + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    if(!stars.length) makeStars();
    draw();
  }
  function makeStars(){
    stars = [];
    const cols = ['#ffffff','#ffffff','#ffffff','#cfe0ff','#FFF3C4'];
    for(let i=0;i<64;i++){
      stars.push({
        x: Math.random(), y: Math.random(),
        r: Math.random()*1.4 + 0.35,
        a: 0.25 + Math.random()*0.6,
        ph: Math.random()*Math.PI*2,
        sp: 0.6 + Math.random()*1.6,
        c: cols[Math.floor(Math.random()*cols.length)]
      });
    }
  }

  let grid = [];
  let score = 0, timeLeft = ROUND_TIME, playing = false;
  let timerId = null;
  let dragging = false, path = [];
  let particles = [];
  let lastT = 0;
  let stars = [];
  let combo = 0, lastClearTime = 0;
  let shake = 0;
  const COMBO_WINDOW = 2.5;

  function rnd(){ return Math.floor(Math.random()*COLORS.length); }
  function makeGrid(){
    grid = [];
    for(let r=0;r<ROWS;r++){ const row=[]; for(let c=0;c<COLS;c++) row.push(rnd()); grid.push(row); }
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const bw = cell*COLS, bh = cell*ROWS;
    // space gradient background
    const bg = ctx.createRadialGradient(bw*0.5, bh*0.32, bh*0.04, bw*0.5, bh*0.55, bh*0.95);
    bg.addColorStop(0, '#2a356b');
    bg.addColorStop(0.5, '#141a3c');
    bg.addColorStop(1, '#070a1a');
    ctx.fillStyle = bg;
    ctx.fillRect(-cell*0.5, -cell*0.5, bw+cell, bh+cell);
    // twinkling stars
    const now = performance.now()*0.001;
    for(const s of stars){
      const tw = 0.35 + 0.65*Math.abs(Math.sin(s.ph + now*s.sp));
      ctx.globalAlpha = s.a * tw;
      ctx.fillStyle = s.c;
      ctx.beginPath(); ctx.arc(s.x*bw, s.y*bh, s.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    const pad = cell*0.5;
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const v = grid[r][c];
        if(v<0) continue;
        const cx = c*cell + cell/2, cy = r*cell + cell/2;
        const rad = cell*0.40;
        drawToken(cx, cy, rad, v, inPath(r,c));
      }
    }
    // path line
    if(path.length>1){
      ctx.lineWidth = Math.max(4, cell*0.12);
      ctx.strokeStyle = 'rgba(39,131,222,0.55)';
      ctx.lineJoin='round'; ctx.lineCap='round';
      ctx.beginPath();
      path.forEach((p,i)=>{
        const x=p.c*cell+cell/2, y=p.r*cell+cell/2;
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      });
      ctx.stroke();
    }
  }

  function drawTsum(cx, cy, rad, color, active){
    ctx.save();
    if(active){ ctx.shadowColor='rgba(0,0,0,0.15)'; ctx.shadowBlur=8; }
    // body
    ctx.beginPath();
    ctx.arc(cx, cy, active? rad*1.06 : rad, 0, Math.PI*2);
    ctx.fillStyle = color.body; ctx.fill();
    ctx.shadowBlur=0;
    // cheeks
    ctx.fillStyle = color.cheek;
    ctx.beginPath(); ctx.arc(cx-rad*0.42, cy+rad*0.18, rad*0.16, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+rad*0.42, cy+rad*0.18, rad*0.16, 0, Math.PI*2); ctx.fill();
    // eyes
    ctx.fillStyle = '#2C2C2B';
    ctx.beginPath(); ctx.arc(cx-rad*0.28, cy-rad*0.12, rad*0.10, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+rad*0.28, cy-rad*0.12, rad*0.10, 0, Math.PI*2); ctx.fill();
    // eye shine
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx-rad*0.31, cy-rad*0.16, rad*0.035, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+rad*0.25, cy-rad*0.16, rad*0.035, 0, Math.PI*2); ctx.fill();
    // mouth
    ctx.strokeStyle = '#2C2C2B'; ctx.lineWidth = Math.max(1.4, rad*0.05); ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(cx, cy+rad*0.06, rad*0.16, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
    ctx.restore();
  }

  function drawToken(cx, cy, rad, v, active){
    const img = IMGS[v];
    const d = (active ? rad*1.12 : rad*1.0) * 2;
    const bw = Math.max(2.5, rad*0.16);
    ctx.save();
    if(active){ ctx.shadowColor='rgba(255,255,255,0.85)'; ctx.shadowBlur=cell*0.28; }
    // border ring (turns white + glows when connected for visibility)
    ctx.beginPath(); ctx.arc(cx, cy, d/2 + bw, 0, Math.PI*2);
    ctx.fillStyle = active ? '#ffffff' : COLORS[v].body; ctx.fill();
    ctx.shadowBlur = 0;
    if(img && img.complete && img.naturalWidth){
      ctx.drawImage(img, cx-d/2, cy-d/2, d, d);
    } else {
      ctx.beginPath(); ctx.arc(cx, cy, d/2, 0, Math.PI*2);
      ctx.fillStyle = COLORS[v].body; ctx.fill();
    }
    // brighten connected tokens so the chain is obvious
    if(active){
      ctx.beginPath(); ctx.arc(cx, cy, d/2, 0, Math.PI*2); ctx.clip();
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = 'rgba(255,255,255,0.30)';
      ctx.beginPath(); ctx.arc(cx, cy, d/2, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  function inPath(r,c){ return path.some(p=>p.r===r&&p.c===c); }

  function spawnBurst(cx, cy, color, tier){
    tier = Math.max(0, Math.min(5, tier|0)); // 0 = super shabby, 5 = max
    const P = {
      dots:  [3, 7, 11, 16, 22, 30][tier],
      sparks:[0, 2, 4, 6, 9, 13][tier],
      rings: [0, 1, 1, 2, 2, 3][tier],
      flash: [0.08, 0.12, 0.15, 0.19, 0.24, 0.30][tier],
      spd:   [0.55, 0.85, 1.10, 1.35, 1.65, 1.95][tier],
      dsz:   [0.05, 0.07, 0.09, 0.11, 0.13, 0.15][tier],
      grow:  [0.35, 0.60, 0.85, 1.15, 1.45, 1.80][tier]
    };
    // white pop core
    particles.push({ type:'flash', x:cx, y:cy, r:cell*P.flash, life:0, max:0.18+tier*0.02 });
    // shockwave rings
    for(let i=0;i<P.rings;i++){
      particles.push({ type:'ring', x:cx, y:cy, r:cell*(0.10+i*0.10), life:i*0.05, max:0.38+tier*0.02,
        color: (i%2) ? '#ffffff' : color.body, grow:cell*P.grow });
    }
    // colorful confetti dots
    const pal = [color.body, color.cheek, '#FFFFFF', '#F2C24E'];
    for(let i=0;i<P.dots;i++){
      const a = (Math.PI*2*i)/P.dots + Math.random()*0.5;
      const sp = cell*P.spd*(0.8 + Math.random()*0.6);
      particles.push({ type:'dot', x:cx, y:cy, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp - cell*0.5*P.spd,
        r:cell*P.dsz*(0.7+Math.random()*0.8), life:0, max:0.45+Math.random()*0.2+tier*0.03,
        color: pal[Math.floor(Math.random()*pal.length)] });
    }
    // twinkling sparkles
    for(let i=0;i<P.sparks;i++){
      const a = Math.random()*Math.PI*2;
      const sp = cell*P.spd*(0.5 + Math.random()*0.7);
      particles.push({ type:'spark', x:cx, y:cy, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp - cell*0.4,
        r:cell*(0.10+tier*0.012)*(0.7+Math.random()*0.7), life:0, max:0.5+Math.random()*0.25+tier*0.03,
        rot:Math.random()*Math.PI, spin:(Math.random()-0.5)*8,
        color: Math.random()<0.5 ? '#FFF6C8' : '#FFFFFF' });
    }
  }

  function updateParticles(dt){
    if(!particles.length) return;
    for(const p of particles){
      p.life += dt;
      if(p.type==='dot'){ p.x += p.vx*dt; p.y += p.vy*dt; p.vy += cell*4*dt; p.vx *= 0.98; }
      else if(p.type==='spark'){ p.x += p.vx*dt; p.y += p.vy*dt; p.vy += cell*2*dt; p.vx *= 0.96; p.vy *= 0.98; p.rot += p.spin*dt; }
      else if(p.type==='text'){ p.y += p.vy*dt; p.vy += cell*0.6*dt; }
    }
    particles = particles.filter(p=>p.life < p.max);
  }

  function drawParticles(){
    for(const p of particles){
      const k = p.life/p.max;
      ctx.save();
      if(p.type==='flash'){
        const rr = p.r + k*cell*0.55;
        ctx.globalAlpha = (1-k);
        const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,rr);
        g.addColorStop(0,'rgba(255,255,255,0.95)');
        g.addColorStop(0.6,'rgba(255,255,255,0.55)');
        g.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(p.x, p.y, rr, 0, Math.PI*2); ctx.fill();
      } else if(p.type==='ring'){
        const rr = p.r + k*(p.grow||cell*0.55);
        ctx.globalAlpha = (1-k)*0.6;
        ctx.lineWidth = Math.max(2, cell*0.10*(1-k));
        ctx.strokeStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, rr, 0, Math.PI*2); ctx.stroke();
      } else if(p.type==='dot'){
        ctx.globalAlpha = Math.max(0, 1-k);
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color; ctx.shadowBlur = cell*0.15;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r*(1-0.3*k), 0, Math.PI*2); ctx.fill();
      } else if(p.type==='spark'){
        const tw = 0.6 + 0.4*Math.sin(p.life*22);
        ctx.globalAlpha = Math.max(0, 1-k)*tw;
        ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.shadowColor = '#FFE9A8'; ctx.shadowBlur = cell*0.2;
        const r = p.r*(1-0.2*k);
        ctx.beginPath();
        for(let i=0;i<4;i++){
          const a = (Math.PI/2)*i;
          ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
          ctx.lineTo(Math.cos(a+Math.PI/4)*r*0.3, Math.sin(a+Math.PI/4)*r*0.3);
        }
        ctx.closePath(); ctx.fill();
      } else if(p.type==='text'){
        ctx.globalAlpha = Math.max(0, 1-k);
        const scale = k<0.18 ? (0.4 + 0.6*(k/0.18)) : 1;
        ctx.translate(p.x, p.y); ctx.scale(scale, scale);
        ctx.font = 'bold ' + Math.round(cell*(p.size||0.4)) + 'px system-ui, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.lineWidth = cell*0.08; ctx.strokeStyle = 'rgba(0,0,0,0.45)';
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.glow || 'rgba(0,0,0,0.35)'; ctx.shadowBlur = cell*(p.glow?0.3:0.12);
        ctx.strokeText(p.text, 0, 0); ctx.fillText(p.text, 0, 0);
      }
      ctx.restore();
    }
  }

  function animate(t){
    const dt = lastT ? Math.min(0.05, (t-lastT)/1000) : 0;
    lastT = t;
    updateParticles(dt);
    if(shake > 0.01) shake *= Math.pow(0.004, dt); else shake = 0;
    ctx.save();
    if(shake > 0.3){
      ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
    }
    draw();
    drawParticles();
    ctx.restore();
    requestAnimationFrame(animate);
  }

  function cellFromEvent(e){
    const rect = canvas.getBoundingClientRect();
    const px = (e.clientX - rect.left);
    const py = (e.clientY - rect.top);
    const c = Math.floor(px / cell), r = Math.floor(py / cell);
    if(r<0||r>=ROWS||c<0||c>=COLS) return null;
    // require pointer near center for tidy connections
    const cx = c*cell+cell/2, cy = r*cell+cell/2;
    const dist = Math.hypot(px-cx, py-cy);
    if(dist > cell*0.48) return null;
    return {r,c};
  }

  function adjacent(a,b){ return Math.abs(a.r-b.r)<=1 && Math.abs(a.c-b.c)<=1 && !(a.r===b.r&&a.c===b.c); }

  function onDown(e){
    if(!playing) return;
    e.preventDefault();
    const cellPos = cellFromEvent(e);
    if(!cellPos) return;
    dragging = true; path = [cellPos]; draw();
  }
  function onMove(e){
    if(!playing||!dragging) return;
    e.preventDefault();
    const cellPos = cellFromEvent(e);
    if(!cellPos) return;
    const last = path[path.length-1];
    if(cellPos.r===last.r && cellPos.c===last.c) return;
    // backtrack
    if(path.length>=2){
      const prev = path[path.length-2];
      if(prev.r===cellPos.r && prev.c===cellPos.c){ path.pop(); draw(); return; }
    }
    if(inPath(cellPos.r,cellPos.c)) return;
    if(grid[cellPos.r][cellPos.c] !== grid[last.r][last.c]) return;
    if(!adjacent(last,cellPos)) return;
    path.push(cellPos); draw();
  }
  function onUp(e){
    if(!playing||!dragging) return;
    dragging = false;
    if(path.length>=3){
      clearPath();
    }
    path = []; draw();
  }

  function clearPath(){
    const n = path.length;
    // combo: chain clears that happen within COMBO_WINDOW seconds
    const now = Date.now()/1000;
    if(now - lastClearTime <= COMBO_WINDOW) combo++; else combo = 1;
    lastClearTime = now;
    // effect tier escalates every 5 combos (0..5): combo 1-4 = tiny, 25+ = max
    const tier = Math.min(5, Math.floor(combo/5));
    // screen shake near the 15s theoretical combo ceiling (~25+)
    if(combo >= 25){
      shake = Math.max(shake, cell*(0.06 + Math.min(combo-25,10)*0.01));
    }
    path.forEach(p=>{
      const cx = p.c*cell + cell/2, cy = p.r*cell + cell/2;
      spawnBurst(cx, cy, COLORS[grid[p.r][p.c]], tier);
      grid[p.r][p.c] = -1;
    });
    // scoring: grows with chain length
    // scoring with a gentle combo bonus
    const base = n*10 + (n-3)*n*2;
    const comboBonus = combo >= 2 ? (combo-1)*5 : 0;
    const gained = base + comboBonus;
    score += gained;
    scoreEl.textContent = score;
    // floating score popup at the centroid of the cleared chain
    let sx=0, sy=0;
    path.forEach(p=>{ sx += p.c*cell+cell/2; sy += p.r*cell+cell/2; });
    sx/=n; sy/=n;
    particles.push({ type:'text', x:sx, y:sy, vy:-cell*1.3, life:0, max:0.9, text:'+'+gained, color:'#F2C24E', size:0.4 });
    // combo popup (escalates every 5 combos, kept subtle)
    if(combo >= 2){
      const cs = comboStyle(combo);
      particles.push({ type:'text', x:sx, y:sy-cell*0.6, vy:-cell*1.05, life:0, max:0.95+Math.min(combo,30)*0.01,
        text: combo + ' コンボ ' + cs.emoji, color: cs.color, size: cs.size, glow: cs.glow });
    }
    flash(gained);
    collapse();
  }

  function flash(gained){
    hintEl.textContent = '+' + gained + ' ポイント！';
    hintEl.style.color = '#7FE0A6';
    clearTimeout(flash._t);
    flash._t = setTimeout(()=>{ hintEl.style.color=''; hintEl.textContent=''; }, 800);
  }

  function comboStyle(c){
    if(c >= 25) return { color:'#C6A0FF', size:0.66, glow:'#9A5CFF', emoji:'⚡' };
    if(c >= 20) return { color:'#FF8FB6', size:0.60, glow:'#FF4E86', emoji:'💥' };
    if(c >= 15) return { color:'#FF7E7E', size:0.55, glow:'#FF3B3B', emoji:'🔥' };
    if(c >= 10) return { color:'#FFAD52', size:0.50, glow:'#FF6A1E', emoji:'🌟' };
    if(c >= 5)  return { color:'#FFE277', size:0.46, glow:'#FFC24E', emoji:'⭐' };
    return { color:'#FFE277', size:0.42, glow:'#FFC24E', emoji:'✨' };
  }

  function collapse(){
    for(let c=0;c<COLS;c++){
      let stack=[];
      for(let r=ROWS-1;r>=0;r--){ if(grid[r][c]>=0) stack.push(grid[r][c]); }
      for(let r=ROWS-1;r>=0;r--){ grid[r][c] = stack.length? stack.shift() : rnd(); }
    }
    draw();
  }

  function startGame(){
    makeGrid();
    score = 0; timeLeft = ROUND_TIME; playing = true;
    combo = 0; lastClearTime = 0;
    scoreEl.textContent = '0'; timeEl.textContent = ROUND_TIME;
    timerfill.style.width = '100%';
    overlay.classList.remove('show');
    result.classList.remove('show');
    appEl.classList.remove('prestart');
    hintEl.textContent = '';
    draw();
    clearInterval(timerId);
    const startT = Date.now();
    timerId = setInterval(()=>{
      const elapsed = (Date.now()-startT)/1000;
      timeLeft = Math.max(0, ROUND_TIME - elapsed);
      timeEl.textContent = Math.ceil(timeLeft);
      timerfill.style.width = (timeLeft/ROUND_TIME*100) + '%';
      if(timeLeft<=0){ endGame(); }
    }, 100);
  }

  function endGame(){
    playing = false; dragging=false; path=[];
    clearInterval(timerId);
    draw();
    const points = Math.floor(score / 20);
    let stars, rank;
    if(score >= 300){ stars = 3; rank = 'イキイキ習慣マスター！'; }
    else if(score >= 150){ stars = 2; rank = 'あと一歩！セサミン見習い'; }
    else { stars = 1; rank = 'まずは一杯！ビギナー'; }
    rScore.textContent = score;
    rPoint.innerHTML = points + '<small>pt</small>';
    let starHtml = '';
    for(let i=0;i<3;i++){ starHtml += (i<stars) ? '<b>★</b>' : '<span class="off">★</span>'; }
    rStars.innerHTML = starHtml;
    rRank.textContent = rank;
    result.classList.add('show');
  }

  startBtn.addEventListener('click', startGame);
  rRetry.addEventListener('click', startGame);
  canvas.addEventListener('pointerdown', onDown);
  canvas.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
  window.addEventListener('resize', layout);

  makeGrid();
  layout();
  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
